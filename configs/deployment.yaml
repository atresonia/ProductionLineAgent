# deployment.yaml — api service configuration
# Version: 2.1  (deployed 2026-03-21)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
    version: "2.1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    spec:
      containers:
        - name: api
          image: resolve/api:2.1
          ports:
            - containerPort: 8000
          env:
            - name: DB_HOST
              value: "db"
            - name: DB_USER
              value: "resolve"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
            # BUG: PAYMENT_GATEWAY_URL was renamed in v2.1 but
            # the secret was never updated — points to old endpoint
            - name: PAYMENT_GATEWAY_URL
              value: "https://payments-legacy.internal/v1"   # <-- stale
            - name: PAYMENT_GATEWAY_KEY
              value: ""                                       # <-- missing
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            # NOTE: no memory limit set — OOM risk if leak occurs
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
